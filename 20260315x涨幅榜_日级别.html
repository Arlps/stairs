		//统计历史存储信息
		function sumup(){
			const data = getLocal("Vol1and5");
			const countMap = new Map();
			data.forEach(item => {
			  const symbol = item.symbol;
			  if (countMap.has(symbol)) {
			    countMap.set(symbol, countMap.get(symbol) + 1);
			  } else {
			    countMap.set(symbol, 1);
			  }
			});
			
			// 获取不重复的name数量（Map的大小）
			const uniqueNameCount = countMap.size;
			
			// 将Map转换为对象方便查看（可选）
			const nameCounts = Object.fromEntries(countMap);
			
			console.log('不重复的name数量:', uniqueNameCount); // 输出: 3
			console.log('每个name的重复次数:', nameCounts);
		}
		
		
		// 获取所有合约名称
		function getBinancePerpetualSymbolsSync() {
		    var symbolsArray = [];
		    $.ajax({
		        url: 'https://fapi.binance.com/fapi/v1/exchangeInfo', // 币安永续合约API地址[5](@ref)
		        type: 'GET', // 使用GET方法[1](@ref)
		        dataType: 'json', // 预期返回JSON格式数据[1](@ref)
		        async: false, // 关键设置：启用同步模式[2,6,7](@ref)
		        success: function(response) {
		            // 成功回调函数内处理数据[1,3](@ref)
		            if (response && response.symbols) {
		                // 筛选永续合约并提取名称[1](@ref)
		                symbolsArray = response.symbols
		                    .filter(symbol => symbol.contractType === 'PERPETUAL' && symbol.symbol.endsWith('USDT') && !symbol.symbol.startsWith('1000')) // 过滤永续合约
		                    .map(symbol => symbol.symbol); // 提取交易对名称
		            }
		        },
				
		        error: function(xhr, status, error) {
		            // 错误处理[1,7](@ref)
		            console.error('请求失败:', status, error);
		            alert('获取数据失败，请检查网络连接或API可用性。');
		        }
		    });
		    
		    return symbolsArray; // 返回结果数组[8](@ref)
		}
		
		//指定时刻刷新(30m)
		function startTimer() {
		    setInterval(function () {
		        var now = new Date();
		
		        var minute = now.getMinutes();
		        var second = now.getSeconds();
		
		        // 每 1 分钟的 05 秒
				const pointTime=pointTick;
		       // 每小时的 00分05秒 和 30分05秒 触发
		        if ((minute === 0 || minute === 30) && second === 5) {
		            var key = now.getHours() + ':' + minute;
		            // 防止同一时间点重复触发
		            if (lastTrigger !== key) {
		                lastTrigger = key;
		                // console.log('触发时间：', now.toLocaleTimeString());
		               startMonitoring();
						
		            }
		        }
		    }, 1000);
		}

		//箱体回踩
		function x_box(symbol, item, arr,num) {
		  // 数据量不足直接返回
		  if (!arr || arr.length < 55) return false;
		  if (!arr || arr.length < 201) return false;
		  arr = arr.slice(-num);
		
		  // ── 工具函数 ──────────────────────────────────────────────
		  // 计算一段K线的典型价格宽度（用于判断"触及"容忍度）
		  function avgRange(klines) {
		    let sum = 0;
		    for (const k of klines) sum += (k.high - k.low);
		    return sum / klines.length;
		  }
		
		  // ── 参数 ──────────────────────────────────────────────────
		  const MIN_BOX_LEN        = 50;   // 箱体最少K线数
		  const MIN_TOUCH_COUNT    = 3;    // 最少触顶次数
		  const MIN_TOUCH_GAP      = 5;    // 相邻触顶最少间隔根数
		  const BREAK_MIN          = 2;    // 突破K线最少根数
		  const BREAK_MAX          = 10;   // 突破K线最多根数
		  const TOUCH_RATIO        = 0.003; // 触及容忍比例（价格的 0.3%）
		  const BREAK_RATIO        = 0.005; // 突破判定比例（close > resistance * (1 + ratio)）
		  const ABOVE_RATIO        = 0.98;  // 突破后"基本在上方"判定（close > resistance * ratio）
		
		  const totalLen = arr.length;
		
		  // ── 枚举箱体结束位置（箱体至少50根，后面至少留2根突破）──
		  for (let boxEnd = MIN_BOX_LEN - 1; boxEnd <= totalLen - BREAK_MIN - 1; boxEnd++) {
		    const boxArr = arr.slice(0, boxEnd + 1);
		
		    // 1. 找箱体最高点作为候选阻力位（取所有K线 high 的最大值）
		    let resistance = -Infinity;
		    for (const k of boxArr) if (k.high > resistance) resistance = k.high;
		
		    // 动态容忍带 = 平均波幅 × 1.5 或价格的 TOUCH_RATIO，取较大值
		    const tol = Math.max(resistance * TOUCH_RATIO, avgRange(boxArr) * 1.5);
		
		    // 2. 找触顶：high 在 [resistance - tol, resistance] 范围内
		    //    且每处之间距离 >= MIN_TOUCH_GAP
		    const touchIndices = [];
		    for (let i = 0; i < boxArr.length; i++) {
		      const k = boxArr[i];
		      if (k.high >= resistance - tol && k.high <= resistance + tol * 0.3) {
		        // 与上一个触顶的间距要 >= MIN_TOUCH_GAP
		        if (
		          touchIndices.length === 0 ||
		          i - touchIndices[touchIndices.length - 1] >= MIN_TOUCH_GAP
		        ) {
		          touchIndices.push(i);
		        }
		      }
		    }
		    if (touchIndices.length < MIN_TOUCH_COUNT) continue;
		
		    // 3. 检测箱体之后的突破：close 持续高于 resistance（2~10根）
		    let breakStart = -1;
		    let breakEnd   = -1;
		
		    for (let j = boxEnd + 1; j < Math.min(totalLen, boxEnd + 1 + BREAK_MAX); j++) {
		      if (arr[j].close > resistance * (1 + BREAK_RATIO)) {
		        if (breakStart === -1) breakStart = j;
		        breakEnd = j;
		      } else {
		        // 一旦收盘跌回阻力位以下，突破中断
		        if (breakStart !== -1) break;
		      }
		    }
		
		    if (breakStart === -1) continue;
		    const breakLen = breakEnd - breakStart + 1;
		    if (breakLen < BREAK_MIN || breakLen > BREAK_MAX) continue;
		
		    // 4. 突破后的所有剩余K线（breakEnd 之后）基本都在阻力位之上
		    //    且其中至少有一根 low 触及阻力位（回踩）
		    const afterBreak = arr.slice(breakEnd + 1);
		    if (afterBreak.length === 0) continue;
		
		    // 4a. 基本在上方：所有 close >= resistance * ABOVE_RATIO
		    const allAbove = afterBreak.every(k => k.close >= resistance * ABOVE_RATIO);
		    if (!allAbove) continue;
		
		    // 4b. 至少有一根回踩：low 触及阻力位（low 在 [resistance - tol, resistance + tol]）
		    const hasRetest = afterBreak.some(
		      k => k.low >= resistance - tol && k.low <= resistance + tol
		    );
		    if (!hasRetest) continue;
		
		    // ── 所有条件成立 ─────────────────────────────────────────
		    const breakCandle = arr[breakStart]; // 第一根突破K线
		    collect_signal(symbol, item, "box"+resistance, breakCandle.time);
		    return true;
		  }
		
		  return false;
		}
		
		
		//大级别承接
		function bear(symbol, item, arr, num) {
		  // 获取最后 num 根K线（如果数组长度小于 num 则取全部）
		  const candles = arr.length <= num ? arr : arr.slice(arr.length - num);
		  
		  if (candles.length < 4) return false; // 至少需要 M(3根) + A(1根)
		
		  // 辅助函数
		  const isDown = (c) => c.close < c.open;  // 判断是否为下跌K线
		  const isUp = (c) => c.close > c.open;    // 判断是否为上涨K线
		  const changePercent = (c) => ((c.close - c.open) / c.open) * 100;  // 计算涨跌幅百分比
		  const bodyRatio = (c) => {               // 计算K线实体占比
		    const body = Math.abs(c.close - c.open);
		    const total = c.high - c.low;
		    return total === 0 ? 0 : body / total;
		  };
		
		  // 查找所有有效的 M 区间，并在其后检查 A
		  // 遍历可能的 M 结束位置
		  // M 必须以 candles[i] 结束，A 是 candles[i+1]
		
		  for (let aIdx = 1; aIdx < candles.length; aIdx++) {
		    const A = candles[aIdx];  // A 是 M 后面的那根K线
		
		    // 尝试找到一个有效的 M，它以 aIdx-1 结束
		    // M 可以是单根跌幅 > 50% 的K线，或者连续至少3根下跌K线
		
		    // 检查单根K线作为 M（即 aIdx-1 位置的K线）
		    const singleM = candles[aIdx - 1];
		    if (isDown(singleM)) {
		      const drop = ((singleM.open - singleM.close) / singleM.open) * 100;
		      if (drop > 50) {  // 单根跌幅超过50%
		        // 检查 A 的条件
		        const rRaw = A.volume / singleM.volume;
		        const r = Math.round(rRaw * 10) / 10;  // 成交量倍数，保留1位小数
		
		        if (A.volume >= singleM.volume * 0.98 && A.volume >= singleM.volume) {
		          // A 的成交量 >= M 最后一根成交量的0.98倍，且 >= M的平均成交量（单根即自身）
		          let aValid = true;
		          if (isDown(A)) {  // 如果 A 是下跌K线
		            if (bodyRatio(A) > 0.15) aValid = false;  // 实体占比不能超过15%
		          }
		
		          if (aValid) {
		            const totalDrop = (((singleM.open - singleM.close) / singleM.open) * 100).toFixed(2) + "%";
		            collect_signal(symbol, item, `bear:${totalDrop}${r}倍`, A.time);
		            return true;
		          }
		        }
		      }
		    }
		
		    // 检查连续的 M 区间，以 aIdx-1 结束
		    // M 必须至少有3根K线
		    // 尝试所有可能的 M 起始位置
		    for (let mStart = 0; mStart <= aIdx - 3; mStart++) {
		      const mCandles = candles.slice(mStart, aIdx); // M 区间内的K线
		      const mLen = mCandles.length;
		
		      if (mLen < 3) continue;  // 长度不足3根，跳过
		
		      // 验证 M 区间：连续下跌趋势并遵循规则
		      // - 如果长度为3：必须全部是下跌K线
		      // - 如果长度 > 3：最多允许1根上涨K线，但：
		      //   * 上涨K线的涨幅必须 < 0.2%
		      //   * 上涨K线不能在头部（索引0）或尾部（索引mLen-1）
		
		      let upCount = 0;           // 上涨K线的计数
		      let upInvalidPosition = false;  // 上涨K线位置是否无效
		      let upExceedsLimit = false;     // 上涨K线是否超过涨幅限制
		
		      for (let i = 0; i < mLen; i++) {
		        const c = mCandles[i];
		        if (isUp(c)) {  // 如果是上涨K线
		          upCount++;
		          if (mLen === 3) {  // 长度为3时不允许上涨
		            upInvalidPosition = true;
		            break;
		          }
		          // 对于长度 > 3 的情况
		          if (i === 0 || i === mLen - 1) {  // 上涨不能在首尾位置
		            upInvalidPosition = true;
		            break;
		          }
		          const gainPct = changePercent(c);
		          if (gainPct >= 0.2) {  // 涨幅不能超过0.2%
		            upExceedsLimit = true;
		            break;
		          }
		        }
		      }
		
		      if (upInvalidPosition || upExceedsLimit) continue;  // 不符合规则，跳过
		      if (mLen === 3 && upCount > 0) continue;  // 长度为3时不能有上涨
		      if (mLen > 3 && upCount > 1) continue;    // 长度>3时最多1次上涨
		
		      // 计算 M 区间的总跌幅
		      const mOpen = mCandles[0].open;              // M 第一根的开盘价
		      const mClose = mCandles[mLen - 1].close;     // M 最后一根的收盘价
		      const totalDropPct = ((mOpen - mClose) / mOpen) * 100;  // 总跌幅百分比
		
		      if (totalDropPct < 18) continue;  // 总跌幅必须 >= 18%
		
		      // 检查 A 的条件
		      const lastMCandle = mCandles[mLen - 1];  // M 的最后一根K线
		      const avgMVolume = mCandles.reduce((sum, c) => sum + c.volume, 0) / mLen;  // M 的平均成交量
		
		      const rRaw = A.volume / lastMCandle.volume;
		      const r = Math.round(rRaw * 10) / 10;  // 成交量倍数，保留1位小数
		
		      if (A.volume < lastMCandle.volume * 0.98) continue;  // A成交量 >= M最后一根的0.98倍
		      if (A.volume < avgMVolume) continue;                  // A成交量 >= M平均成交量
		
		      let aValid = true;
		      if (isDown(A)) {  // 如果 A 是下跌K线
		        if (bodyRatio(A) > 0.15) {  // 实体占比不能超过15%
		          aValid = false;
		        }
		      }
		
		      if (!aValid) continue;
		
		      const totalDrop = totalDropPct.toFixed(2) + "%";
		      collect_signal(symbol, item, `bear:${totalDrop}${r}倍`, A.time);
		      return true;
		    }
		  }
		
		  return false;  // 未找到符合条件的信号
		}

		//收集信号
		function collect_signal(symbol,interval,signal,time){
			//先删除arr里面相同的成员，再加入新的信号对象
			const index = redAlertArr.findIndex(item => 
			    item.symbol === symbol && item.interval === interval
			);
			
			if (index !== -1) {
			    redAlertArr.splice(index, 1);
			}
			
			// 添加新成员
			redAlertArr.push({
			    symbol: symbol,
			    interval: interval,
			    signal: signal,
				time:time
			});
		}

			    const interval = item.interval;
			    if (classifyArr[interval]) {

			    }
			  });
			  
			  return classifyArr;
		}

		//=============涨幅榜板块===============================================================
		//收集所有合约各时段的涨幅数据
		function collectPercent(klineData,symbol){
			//如果最后一根还未走完 去除最后一根未完成的K线
			if(!isKlineCompleted(klineData)){
				klineData=klineData.slice(0, -1);
			}
			const result = {
				"name":symbol, 
				"12h": calculateMaxIncrease(klineData, 1), 
				"1d": calculateMaxIncrease(klineData, 2), 
				"1w": calculateMaxIncrease(klineData, 14), 
			};
			percentArr.push(result)
		}
		
		// 计算最大涨幅的辅助函数（以最后一根完成的K线的收盘价为基准）
		function calculateMaxIncrease (klineData, num){
			if (!klineData || klineData.length<=1) {
				return "0";
			}
			//4收盘 2最高 1开盘 3最低
			const last1=klineData.at(-1);
			//当计算1m涨幅的情况 则直接计算最后一根完成K线的涨幅
			if(num==0){
				const maxPrice=parseFloat(last1[4])
				return (((maxPrice-last1[1])/last1[1])*100).toFixed(2);
				
			//当计算其他时段涨幅，则计算时段内出现过的最低价和最后一根收盘价的涨幅
			}else{
				const nowPrice=parseFloat(last1[4]);
				// 取出指定数量的最新K线，如果数量不足则取全部
				const count = Math.min(num, klineData.length);
				const lastArr = klineData.slice(-count);
				
				// 找出最低价和最高价
				let lowest = Infinity;
				let highest = -Infinity;
				
				lastArr.forEach(kline => {
					const low = parseFloat(kline[3]);  // 最低价
					const high = parseFloat(kline[2]); // 最高价
					
					lowest = Math.min(lowest, low);
					highest = Math.max(highest, high);
				});
				
				// 计算涨幅（百分比），并取整
				if (lowest > 0) {
					// const increase = ((highest - lowest) / lowest) * 100;
					const increase = ((nowPrice - lowest) / lowest) * 100;
					return increase.toFixed(2);
				}
			}
			return "0";
		};

		//对收集完的涨幅数据进行排名分类
		function rankAfterCollect(percentArr) {
		    // 时间周期数组
			 const periods = ['12h','1d','1w'];
			 // const periods = ['1h','2h','4h','12h','1d'];
			  // const periods = ["30m",'1h','4h'];
		    rankArr={}
		    // 初始化每个周期的数组
		    periods.forEach(period => {
		        rankArr[period] = [];
		    });
		    
		    // 对每个周期进行处理
		    periods.forEach(period => {
		        // 创建包含name和percent的对象数组
		        const periodData = percentArr.map(item => ({
		            name: item.name,
		            percent: parseFloat(item[period]), // 转换为数字用于排序
					isBigVol:item.isBigVol   //判断1m是否倍量
		        }));
		        
		        // 按percent降序排序
		        periodData.sort((a, b) => b.percent - a.percent);
		        
		        // 取前20名，并保持percent为字符串格式
		        rankArr[period] = periodData.slice(0, 10).map(item => ({
		            name: item.name,
		            percent: item.percent.toFixed(2), // 保留两位小数转为字符串
					isBigVol:item.isBigVol
		        }));
				
		    });
			
			makeRankTable(rankArr)
		    return rankArr;
		}

		//查询历史资金费率
		function checkFunding(){
			const Funding=getLocal("Funding");
			setTimeout(function(){
				$(".chart-box").each(function(){
					const symbol=$(this).data("name");// console.log(symbol);
					// 检查 Funding 是否存在且不为空
					if (!Funding || !Funding[symbol] || !Array.isArray(Funding[symbol]) || Funding[symbol].length === 0) {
						console.error(`Funding[${symbol}] 不存在或为空数组`);
						return; // 跳过当前元素
					}
					const lastFunding=Funding[symbol].at(-1).f
					const arr=Funding[symbol].reverse().slice(1,10);
					const brr = calculateBrr(arr,lastFunding);
					let brrStr=(lastFunding*100)+"%  (";
					for (var i = 0; i < brr.length; i++) {
						brrStr+=brr[i]+" "
					}
					brrStr+=")";
					$("<span class='funding'>"+brrStr+"</span>").appendTo($(this))
				});
				
			},500)
		}
		function calculateBrr(arr, baseValue) {
		    return arr.map(item => {
		        // 计算差值：baseValue - f
		        const diff = baseValue - item.f;
		        
		        // 差值乘以 10000
		        const result =parseInt(diff * 10000);
		        
		        // 格式化结果，正数前面加+号
		        return result >= 0 ? `+${result}` : result;
		    });
		}

			return klineData.map(kline => {

				    open: +kline[1],   // 开盘价（转为数字）
				    high: +kline[2],   // 最高价
				    low:+kline[3],    // 最低价
				    close: +kline[4],  // 收盘价
				    volume: +kline[5], // 成交量
				    closeTime: kline[6],          // 收盘时间
				    quoteVolume: +kline[7], // 成交额
				    trades: +kline[8]
				};
			});
		}

		//将数组里面symbol值一样的对象成员去重
		function uniqueBySymbol(arr) {
		  const map = new Map();
		  const result = [];
		  
		  for (const item of arr) {
		    if (!map.has(item.symbol)) {
		      map.set(item.symbol, true);
		      result.push(item);
		    }
		  }
		  
		  return result;
		}

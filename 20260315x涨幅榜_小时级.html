		//初始化option

			var obj={

		//统计历史存储信息
		function sumup(){
			const data = getLocal("Vol1and5");
			const countMap = new Map();
			data.forEach(item => {
			  const symbol = item.symbol;
			  if (countMap.has(symbol)) {
			    countMap.set(symbol, countMap.get(symbol) + 1);
			  } else {
			    countMap.set(symbol, 1);
			  }
			});
			
			// 获取不重复的name数量（Map的大小）
			const uniqueNameCount = countMap.size;
			
			// 将Map转换为对象方便查看（可选）
			const nameCounts = Object.fromEntries(countMap);
			
			console.log('不重复的name数量:', uniqueNameCount); // 输出: 3
			console.log('每个name的重复次数:', nameCounts);
		}
		
		
		// 获取所有合约名称
		function getBinancePerpetualSymbolsSync() {
		    var symbolsArray = [];
		    $.ajax({
		        url: 'https://fapi.binance.com/fapi/v1/exchangeInfo', // 币安永续合约API地址[5](@ref)
		        type: 'GET', // 使用GET方法[1](@ref)
		        dataType: 'json', // 预期返回JSON格式数据[1](@ref)
		        async: false, // 关键设置：启用同步模式[2,6,7](@ref)
		        success: function(response) {
		            // 成功回调函数内处理数据[1,3](@ref)
		            if (response && response.symbols) {
		                // 筛选永续合约并提取名称[1](@ref)
		                symbolsArray = response.symbols
		                    .filter(symbol => symbol.contractType === 'PERPETUAL' && symbol.symbol.endsWith('USDT') && !symbol.symbol.startsWith('1000')) // 过滤永续合约
		                    .map(symbol => symbol.symbol); // 提取交易对名称
		            }
		        },
				
		        error: function(xhr, status, error) {
		            // 错误处理[1,7](@ref)
		            console.error('请求失败:', status, error);
		            alert('获取数据失败，请检查网络连接或API可用性。');
		        }
		    });
		    
		    return symbolsArray; // 返回结果数组[8](@ref)
		}
		
		//指定时刻刷新(30m)
		function startTimer() {
		    setInterval(function () {
		        var now = new Date();
		
		        var minute = now.getMinutes();
		        var second = now.getSeconds();
		
		        // 每 1 分钟的 05 秒
				const pointTime=pointTick;
		       // 每小时的 00分05秒 和 30分05秒 触发
		        if ((minute === 0 || minute === 30) && second === 5) {
		            var key = now.getHours() + ':' + minute;
		            // 防止同一时间点重复触发
		            if (lastTrigger !== key) {
		                lastTrigger = key;
		                // console.log('触发时间：', now.toLocaleTimeString());
		               startMonitoring();
						
		            }
		        }
		    }, 1000);
		}

		// 分批处理交易对
		function processBatch(startIndex) {
			const total = allSymbols.length;
			const BATCH_SIZE = 10; // 控制并发请求数量
			const DELAY = 10; // 请求延迟(ms)
			
		    const endIndex = Math.min(startIndex + BATCH_SIZE, total);
		    for (let i = startIndex; i < endIndex; i++) {
		        setTimeout(() => {
		            const symbol = allSymbols[i];
		            
					Acounter++;
					$scan.html("   扫描："+total+" / "+Acounter+" ( "+symbol+" ) ");
					
					
					//跳过两个无用symbol
					if(symbol=="GAIBUSDT" || symbol=="BTCSTUSDT"){
						return;
					}
		            // 获取K线
		            $.ajax({
		                url: 'https://fapi.binance.com/fapi/v1/klines',
		                method: 'GET',
		                data: {
		                    symbol: symbol,
		                    interval: questInterval,//intervalX,
		                    limit: questKnum//limitX // 获取几根K线
		                },
		                dataType: 'json',
		                success: function(klineData) {
							const test=klineData.at(-1)
							if(test[1]==test[4] && test[2]==test[3]){
								return;
							}
							
							//涨幅版
							collectPercent(klineData,symbol);
							//信号
							redAlert(symbol, klineData)
							//请求数量和合约总数一样，结束
							if(Acounter==total && !finished){
							    finished=true;
								setTimeout(function(){
									finishAnalysis();
								},500)
								
							}
		                },
		                error: function(xhr, status, error) {
		                    if(Acounter==total && !finished){
		                        finished=true;
		                    	finishAnalysis();
		                    }
		                }
		            });
		        }, (i % BATCH_SIZE) * DELAY);
		    }
		    
		    // 处理下一批
		    if (endIndex < total) {
		        setTimeout(() => processBatch(endIndex), BATCH_SIZE * DELAY);
		    }
		}

		//判断1.最后一根下引线 并且前几根基本都是下跌  2.连续下跌 最后上涨成交量逆转
		function x_turn(symbol,item,arr,num){

			const last2=arr.at(-2);

			const downLine_flag=last1_obj.middle_all<=0.1 && last1_obj.down_all>=0.6;

			const end=-1; const start=end-num;

			for (var i = 0; i < lastArr.length; i++) {

					return false;
				}
			}
			
			//计算前几根的下跌幅度，跌幅小于2%淘汰
			const fallPercent=(last2.close-lastArr[0].open)/lastArr[0].open;
			//前面几根总跌幅大于5%
			if(fallPercent>=-0.03){

		//横盘
		function x_crossH(symbol, item, arr) {
		    if (!Array.isArray(arr) || arr.length < 6) return false;
			const ratioPercent=0.2;
			const minPercent=5;
			const ratioVol=5;
		    
		    // 获取A, B, C, X, Y, Z
		    const C = arr[arr.length - 1];
		    const B = arr[arr.length - 2];
		    const A = arr[arr.length - 3];
		    const Z = arr[arr.length - 4];
		    const Y = arr[arr.length - 5];
		    const X = arr[arr.length - 6];
		    
		    // 条件1: A是上涨的，涨幅大于5%
		    if (A.close <= A.open) return false;
		    const aIncrease = (A.close - A.open) / A.open;
		    if (aIncrease * 100 <= minPercent) return false;
			
			// ==== 新增条件：BC至少有一条是上涨的 ====
			const bIsUp = B.close > B.open;  // B是否阳线
			const cIsUp = C.close > C.open;  // C是否阳线
			if (!bIsUp && !cIsUp) {  // BC都不是上涨
				return false;
			}
			
			// ==== 新增条件：B和C的K线长度不能超过A的实体长度 ====
			const aBodyLength = Math.abs(A.close - A.open);  // A的实体长度
			const bTotalLength = Math.abs(B.high - B.low);    // B的总长度（最高-最低）
			const cTotalLength = Math.abs(C.high - C.low);    // C的总长度（最高-最低）
			
			if (bTotalLength > aBodyLength) return false;  // B的总长度 > A实体长度
			if (cTotalLength > aBodyLength) return false;  // C的总长度 > A实体长度
			
		    
		    // 条件2: BC最后两根K线，涨幅绝对值小于A涨幅的20%
		    const bIncrease = Math.abs(B.close - B.open) / B.open;
		    const cIncrease = Math.abs(C.close - C.open) / C.open;
		    if (bIncrease >= aIncrease * ratioPercent) return false;
		    if (cIncrease >= aIncrease * ratioPercent) return false;
		    
		    // 条件3: 检查XYZ是否都是下跌的
		    const xDown = X.close < X.open;
		    const yDown = Y.close < Y.open;
		    const zDown = Z.close < Z.open;
		    const allDown = xDown && yDown && zDown;
		    
		    // 如果XYZ不全是下跌的
		    if (!allDown) {
		        // 计算XYZ平均成交额
		        const xyzAvgQuoteVolume = (X.quoteVolume + Y.quoteVolume + Z.quoteVolume) / 3;
		        // A成交额必须大于XYZ平均成交额的20倍
		        if (A.quoteVolume <= xyzAvgQuoteVolume * ratioVol) return false;
		    }
		    
		    collect_signal(symbol, item, "横盘", A.time);
		}
		function x_crossPro(symbol, item, arr, num) {

		        if (i < 2) continue;
		        const prev1 = klines[i - 1];
		        const prev2 = klines[i - 2];
		        const avgVol = (prev1.volume + prev2.volume) / 2;
		
		        // 条件1：A 成交量是前两根均量的5倍以上
		        if (A.volume < avgVol * 3) continue;
		
				// A 的涨幅 大于0.9%
				const aChange = (A.close - A.open) / A.open;
				if(aChange<=minPercent) continue;
		
		        // A 实体中线
		        const minPrice = (A.open + A.close) / 2;
		
		        // A 之后的所有K线
		        const afterKlines = klines.slice(i + 1);
		        if (afterKlines.length <afterNum) continue;
		
		        let pass = true;

		                if (kLength >= aLength * 0.25) {
		                    pass = false;
		                    break;
		                }
		            } else {
		                // 下跌K线：涨幅绝对值小于 A 涨幅的 30%
		                if (Math.abs(kLength) >= aLength * 0.25) {
		                    pass = false;
		                    break;

		                // 下跌K线：最低价必须大于 A 实体中线
		                if (k.low <= minPrice) {
		                    pass = false;
		                    break;
		                }
		            }
		        }
		
		        if (pass) {
		            collect_signal(symbol, item, "横盘PRO", A.time);
		            return true;
		        }
		    }
		
		    return false;
		}

		//放量上影线
		function x_upline(symbol, item, arr) {
		    if (!Array.isArray(arr) || arr.length < 2) {
		        return false;  // 数据不够
		    }
		    
		    // 确定检测范围：最后10条K线，如果不足10条则检测全部
		    const startIndex = Math.max(1, arr.length - 10);  // 从第1个有效对开始
		    const endIndex = arr.length;  // 到最后一条
		    
		    // 遍历最后10条K线（或全部）
		    for (let i = startIndex; i < endIndex; i++) {
		        const A = arr[i];  // 当前K线（后一根）
		        const B = arr[i-1];  // 前一根K线
		        
		        // 条件1: A是上涨的（阳线）
		        if (A.close <= A.open) {
		            continue;  // 不是阳线，跳过
		        }
		        
		        // 条件2: A的成交量是B的5倍以上
		        if (!A.volume || !B.volume || A.volume <= B.volume * 20) {
		            continue;  // 成交量不足50倍
		        }
		        
		        // 计算上影线长度
		        const objA = lineObj(A);
		        if (objA.up_all < 0.6) {

		        }
		        
		        // 所有条件满足，触发信号
		        collect_signal(symbol, item, "倍量上线", A.time);

		    }

		}
		
		//交易额倍量
		function x_riseVol(symbol, item, arr, num) {
		    if (!arr || arr.length < num + 5) return false;
		
		    const klines = arr.slice(-num);
		
		    for (let i = 0; i < klines.length; i++) {
		        const A = klines[i];
		
		        // A 必须是上涨K线
		        if (A.close <= A.open) continue;
		
		        // 需要 A 前面至少有5根（在原始arr中）
		        // klines[i] 对应 arr 中的索引为 arr.length - num + i
		        const arrIdx = arr.length - num + i;
		        if (arrIdx < 5) continue;
		
		        // 取 A 前面第2根到第5根（跳过紧邻的第1根）
		        // 即 arr[arrIdx-5] ~ arr[arrIdx-2]，共4根
		        const refKlines = arr.slice(arrIdx - 5, arrIdx - 1);
		
		        const avgQuoteVol = refKlines.reduce((sum, k) => sum + k.quoteVolume, 0) / refKlines.length;
		
		        // A 的成交额是均值的20倍以上
		        if (A.quoteVolume < avgQuoteVol * 20) continue;
		
		        collect_signal(symbol, item, "交易额倍量", A.time);
		        return true;
		    }
		
		    return false;
		}
		
		//交易额翻倍
		function x_multiVol(symbol, item, arr, num) {
		  // 检查参数有效性
		  if (!arr || arr.length === 0 || num <= 0) {
		    return false;
		  }
		  
		  // 检查数组长度是否足够
		  if (arr.length < num + 1) {
		    return false;
		  }
		  
		  // 获取最后一根K线A
		  const A = arr[arr.length - 1];
		  
		  // 检查最后一根K线是否上涨
		  if (A.close <= A.open) {
		    return false;
		  }
		  
		  // 计算前面num根K线的总交易额
		  let totalQuoteVolume = 0;
		  let count = 0;
		  
		  // 从A前面的第num根开始向前计算
		  for (let i = arr.length - 2; i >= 0 && count < num; i--) {
		    if (arr[i] && arr[i].quoteVolume) {
		      totalQuoteVolume += arr[i].quoteVolume;
		      count++;
		    }
		  }
		  
		  // 如果没收集到足够的K线数据，返回false
		  if (count < num) {
		    return false;
		  }
		  
		  // 计算平均交易额
		  const avgQuoteVolume = totalQuoteVolume / num;
		  
		  // 检查最后一根K线交易额是否达到8倍以上
		  if (A.quoteVolume >= avgQuoteVolume * 8) {
		    // 条件成立，执行collect_signal
		    return collect_signal(symbol, item, "交易额倍量", A.time);
		  }
		  
		  return false;
		}
		
		//1涨2横
		function x_cross_plus(symbol, item, arr, num, range) {
		    if (num < 1) {
		        return false;  // 至少需要检查1根后续K线
		    }
		    const testNum = range;
		    const preNum = 10;
		    const total = preNum + 1 + num;  // 一个完整信号需要的K线数量
		    
		    // 1. 检查数组长度是否足够
		    if (arr.length < testNum) {
		        console.log(symbol+"-"+item+"-数量不足");
		        return false;
		    }
		    
		    // 2. 确定搜索范围
		    const searchStart = Math.max(0, arr.length - testNum - total + 1);
		    const searchEnd = arr.length - total + 1;
		    
		    // 3. 在指定范围内搜索符合条件的信号
		    for (let signalStart = searchStart; signalStart < searchEnd; signalStart++) {
		        // 3.1 提取当前检查的K线段
		        const signalKlines = arr.slice(signalStart, signalStart + total);
		        
		        // 3.2 检查A是否上涨
		        const A = signalKlines[preNum];
		        let per = 0.03;
		        // if (item == "1m") { 
		        //     per = 0.015; 
		        // }
		        
		        if (A.close <= A.open || (A.close - A.open) / A.open < per) {
		            continue;  // 条件不满足，继续搜索下一个位置
		        }
		        
		        // 3.3 检查A收盘价是否高于前preNum根的最高价
		        let preHigh = signalKlines[0].high;
		        for (let i = 1; i < preNum; i++) {
		            if (signalKlines[i].high > preHigh) {
		                preHigh = signalKlines[i].high;
		            }
		        }
		        if (A.close <= preHigh) {
		            continue;  // 条件不满足，继续搜索下一个位置
		        }
		        
		        // 3.4 检查后续num根K线
		        const AMid = A.close - A.open;
		        const downLine = A.close - AMid * 0.2;
		        let signal = true;
		        
		        for (let i = preNum + 1; i < total; i++) {
		            const thisK = signalKlines[i];
		            
		            // 如果是上涨，实体不能大于A实体的30%
		            if (thisK.close > thisK.open) {
		                const midLength = thisK.close - thisK.open;
		                if (midLength > AMid * 0.3) {
		                    signal = false;
		                    break;
		                }
		            } 
		            // 如果是下跌，收盘价不能低于下轨
		            else { 
		                if (thisK.close < downLine) {
		                    signal = false;
		                    break;
		                }
		            }
		        }
		        
		        // 3.5 如果所有条件都满足，记录信号并返回
		        if (signal) {
		            return collect_signal(symbol, item, "1+2", A.time, signalStart);
		        }
		    }
		    
		    return false;
		}
		
		//单纯持续上涨
		function x_Nrise(symbol, item, arr, num) {
			let N=7;
		    // 检查数据是否足够
		    if (arr.length < num || num < N) {
		        return false;
		    }
		    
		    // 获取最后num根K线
		    const lastKlines = arr.slice(-num);
		    
		    // 查找是否存在连续7根上涨的K线
		    let consecutiveRise = 0;
		    let signalTime = null;
		    
		    for (let i = 0; i < lastKlines.length; i++) {
		        const currentKline = lastKlines[i];
		        
		        // 判断是否为上涨K线（收盘价大于开盘价）
		        if (currentKline.close > currentKline.open) {
		            consecutiveRise++;
		            
		            // 如果是第一个上涨K线，记录时间
		            if (consecutiveRise === 1) {
		                signalTime = currentKline.time;
		            }
		            
		            // 找到连续7根上涨K线
		            if (consecutiveRise >= N) {
		                // 调用信号收集函数
		                collect_signal(symbol, item, "N", signalTime);
		                return true;
		            }
		        } else {
		            // 如果K线下跌，重置计数器
		            consecutiveRise = 0;
		            signalTime = null;
		        }
		    }
		    
		    return false;
		}
		
		//突破前高
		function x_topBreak(symbol, item, arr, num) {
		    if (!arr || arr.length < num) {
		        return false;
		    }
		    
		    // 从倒数第num根开始遍历到最后
		    const startIdx = arr.length - num;
		    
		    for (let i = startIdx; i < arr.length; i++) {
		        const A = arr[i];
		        
		        // 条件1: A必须是上涨K线
		        if (A.close <= A.open) {
		            continue;
		        }
		        
		        // 获取A之前的所有K线
		        const beforeKlines = arr.slice(0, i);
		        if (beforeKlines.length === 0) {
		            continue;
		        }
		        
		        // 条件2: A的收盘价大于前面所有K线的最高价
		        let beforeMaxHigh = -Infinity;
		        for (let j = 0; j < beforeKlines.length; j++) {
		            const k = beforeKlines[j];
		            if (k.high > beforeMaxHigh) {
		                beforeMaxHigh = k.high;
		            }
		        }
		        
		        if (A.close <= beforeMaxHigh) {
		            continue;
		        }
		        
		        // 条件3: A的前一根收盘价，不是A前面所有K线的最高价
		        if (i === 0) {
		            continue;
		        }
		        
		        const prevK = arr[i - 1];
		        if (prevK.close >= beforeMaxHigh) {

		        let sumQuoteVolume = 0;
		        for (const k of beforeKlines) {
		            sumQuoteVolume += k.quoteVolume;
		        }
		        const avgQuoteVolume = beforeKlines.length > 0
		            ? sumQuoteVolume / beforeKlines.length
		            : 0;
		
		        // 条件2：A的成交额 ≥ 前20根平均的5倍
		        if (A.quoteVolume < avgQuoteVolume * 5) {
		            continue;
		        }
		
		        // 条件3：A的下一根K线成交额 < A的成交额
		        const nextK = klines[i + 1];

		        }

		    }

		    const volMultiplier = 10;

		    const start = arr.length - num;
		
		    // A 后面还需要一根 B

		        if (aChange < minAChange) continue;

		        let biggerThanAll = true;

		// 计算最大涨幅的辅助函数（以最后一根完成的K线的收盘价为基准）
		function calculateMaxIncrease (klineData, num){
			if (!klineData || klineData.length<=1) {
				return "0";
			}
			//4收盘 2最高 1开盘 3最低
			const last1=klineData.at(-1);
			//当计算1m涨幅的情况 则直接计算最后一根完成K线的涨幅
			if(num==0){
				const maxPrice=parseFloat(last1[4])
				return (((maxPrice-last1[1])/last1[1])*100).toFixed(2);
				
			//当计算其他时段涨幅，则计算时段内出现过的最低价和最后一根收盘价的涨幅
			}else{
				const nowPrice=parseFloat(last1[4]);
				// 取出指定数量的最新K线，如果数量不足则取全部
				const count = Math.min(num, klineData.length);
				const lastArr = klineData.slice(-count);
				
				// 找出最低价和最高价
				let lowest = Infinity;
				let highest = -Infinity;
				
				lastArr.forEach(kline => {
					const low = parseFloat(kline[3]);  // 最低价
					const high = parseFloat(kline[2]); // 最高价
					
					lowest = Math.min(lowest, low);
					highest = Math.max(highest, high);
				});
				
				// 计算涨幅（百分比），并取整
				if (lowest > 0) {
					// const increase = ((highest - lowest) / lowest) * 100;
					const increase = ((nowPrice - lowest) / lowest) * 100;
					return increase.toFixed(2);
				}
			}
			return "0";
		};

		//对收集完的涨幅数据进行排名分类
		function rankAfterCollect(percentArr) {
		    // 时间周期数组
			 const periods = ["30m",'1h','2h','4h','12h','1d'];
			 // const periods = ['1h','2h','4h','12h','1d'];
			  // const periods = ["30m",'1h','4h'];
		    rankArr={}
		    // 初始化每个周期的数组
		    periods.forEach(period => {
		        rankArr[period] = [];
		    });
		    
		    // 对每个周期进行处理
		    periods.forEach(period => {
		        // 创建包含name和percent的对象数组
		        const periodData = percentArr.map(item => ({
		            name: item.name,
		            percent: parseFloat(item[period]), // 转换为数字用于排序
					isBigVol:item.isBigVol   //判断1m是否倍量
		        }));
		        
		        // 按percent降序排序
		        periodData.sort((a, b) => b.percent - a.percent);
		        
		        // 取前20名，并保持percent为字符串格式
		        rankArr[period] = periodData.slice(0, 10).map(item => ({
		            name: item.name,
		            percent: item.percent.toFixed(2), // 保留两位小数转为字符串
					isBigVol:item.isBigVol
		        }));
				
		    });
			
			makeRankTable(rankArr)
		    return rankArr;
		}
		//涨幅版表格
		function makeRankTable(rankArr){
			$(".container-rank").empty()

				'<div class="rank-wrapper rank-box">'+
					'<button class="rank-chart" id="btn-'+key+'">'+key+'</button>';
					// console.log(rankArr[key])
				for (var i = 0; i < rankArr[key].length; i++) {
					if(i>=10){ break;}
					const name=rankArr[key][i].name;
					tableHtml+=
						'<p class="rank-res">'+
							// '<div>'+
								'<a class="symbol-name2 rank2" data-name="'+name+'" href="https://www.binance.com/zh-CN/futures/'+name+'" target="_blank">'+name+' </a>'+
								'<a href="javascript:void(0)" class="openChart" data-symbol="'+name+'" data-interval="'+key+'"># </a>'+
								'<a class="" href="https://www.coinglass.com/tv/zh/Binance_'+name+'" target="_blank">></a>'+
								'<span class="rank-per">'+rankArr[key][i].percent+'</span>'+
							// '</div>'+
						'</p>';
				}
				tableHtml+='</div>';
				// console.log(tableHtml)
				$(tableHtml).appendTo(".container-rank");
			}
			if($("#autoChart").prop('checked')){
				$("#btn-1m").trigger("click")
			}
			
		}

		//查询历史资金费率
		function checkFunding(){
			const Funding=getLocal("Funding");
			setTimeout(function(){
				$(".chart-box").each(function(){
					const symbol=$(this).data("name");// console.log(symbol);
					// 检查 Funding 是否存在且不为空
					if (!Funding || !Funding[symbol] || !Array.isArray(Funding[symbol]) || Funding[symbol].length === 0) {
						console.error(`Funding[${symbol}] 不存在或为空数组`);
						return; // 跳过当前元素
					}
					const lastFunding=Funding[symbol].at(-1).f
					const arr=Funding[symbol].reverse().slice(1,10);
					const brr = calculateBrr(arr,lastFunding);
					let brrStr=(lastFunding*100)+"%  (";
					for (var i = 0; i < brr.length; i++) {
						brrStr+=brr[i]+" "
					}
					brrStr+=")";
					$("<span class='funding'>"+brrStr+"</span>").appendTo($(this))
				});
				
			},500)
		}
		function calculateBrr(arr, baseValue) {
		    return arr.map(item => {
		        // 计算差值：baseValue - f
		        const diff = baseValue - item.f;
		        
		        // 差值乘以 10000
		        const result =parseInt(diff * 10000);
		        
		        // 格式化结果，正数前面加+号
		        return result >= 0 ? `+${result}` : result;
		    });
		}

		//将apiK线数据格式转为open close
		function reKeyKline(klineData){
			return klineData.map(kline => {

				    open: +kline[1],   // 开盘价（转为数字）
				    high: +kline[2],   // 最高价
				    low:+kline[3],    // 最低价
				    close: +kline[4],  // 收盘价
				    volume: +kline[5], // 成交量
				    closeTime: kline[6],          // 收盘时间
				    quoteVolume: +kline[7], // 成交额
				    trades: +kline[8]
				};
			});
		}

		function reduceArr(A, B) {
		    // 将数组B转换为Set以提高查找效率
		    const setB = new Set(B);
		    // 使用filter方法创建新数组，只保留x值不在setB中的对象
		    return A.filter(item => !setB.has(item.id));
		}

		function reduceArr2(A, B) {
		    // 将数组B转换为Set以提高查找效率
		    const setB = new Set(B);
		    // 使用filter方法创建新数组，只保留x值不在setB中的对象

		//将数组里面symbol值一样的对象成员去重
		function uniqueBySymbol(arr) {
		  const map = new Map();
		  const result = [];
		  
		  for (const item of arr) {
		    if (!map.has(item.symbol)) {
		      map.set(item.symbol, true);
		      result.push(item);
		    }
		  }
		  
		  return result;
		}
